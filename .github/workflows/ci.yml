name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Ensure committed dist is current
        run: |
          before="$(shasum dist/index.js | awk '{print $1}')"
          npm run build
          after="$(shasum dist/index.js | awk '{print $1}')"

          if [ "$before" != "$after" ]; then
            echo "::error::dist/index.js is stale. Run npm run build and commit the result."
            exit 1
          fi
